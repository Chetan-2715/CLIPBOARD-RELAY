<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Card -->
  <rect x="15" y="18" width="70" height="72" rx="16" fill="#08090f" stroke="url(#neonGrad)" stroke-width="3" filter="url(#neonGlow)" />
  <!-- Clipboard Metal Top Bracket -->
  <rect x="38" y="10" width="24" height="12" rx="4" fill="#1b1c24" stroke="url(#neonGrad)" stroke-width="1.5" />
  <path d="M46,14 L54,14" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <!-- Document Transfer Sheet Layer -->
  <rect x="30" y="32" width="40" height="42" rx="6" fill="none" stroke="url(#neonGrad)" stroke-width="2" stroke-dasharray="2 2" />
  <rect x="26" y="36" width="40" height="42" rx="6" fill="none" stroke="#f3f4f6" stroke-width="2" />
  <!-- Central Relay arrow -->
  <path d="M40,54 L60,54 M52,46 L60,54 L52,62" fill="none" stroke="url(#neonGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>